<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的捷徑</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的捷徑">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6EBDD">
<link rel="apple-touch-icon" href="icon-180.png">

<style>
  :root{
    --paper:#F6EFE3; --paper-warm:#EFE6D4; --card:#FDFBF6;
    --ink:#413B31; --ink-soft:#948A78;
    --sage:#7C9270; --sage-deep:#5F7358;
    --clay:#E6A497; --clay-deep:#C97F6E;
    --line:#E7DCC8; --shadow:0 8px 20px rgba(150,110,80,0.14);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background: radial-gradient(circle at 12% 8%, rgba(255,255,255,0.6), transparent 42%), var(--paper);
    color:var(--ink); font-family:"Noto Serif TC","PMingLiU","Georgia",serif;
    min-height:100vh; -webkit-font-smoothing:antialiased; padding-bottom:60px;
  }
  header.top{ padding:26px 20px 6px; text-align:center; }
  header.top .mascot{ width:56px; height:56px; margin:0 auto 4px; display:block; }
  header.top h1{ font-size:1.4rem; font-weight:600; letter-spacing:0.14em; margin:0 0 4px; color:var(--sage-deep); }
  header.top p{ margin:0; font-size:0.76rem; letter-spacing:0.1em; color:var(--ink-soft); }

  .toolbar{
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
    padding:14px 16px 8px;
  }
  .search-box{
    display:flex; align-items:center; gap:6px; background:var(--card);
    border:1px solid var(--line); border-radius:999px; padding:7px 14px; min-width:150px; max-width:220px;
  }
  .search-box input{ border:none; outline:none; background:transparent; font-family:inherit; font-size:0.85rem; width:100%; color:var(--ink); }
  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep);
    border-radius:999px; padding:8px 16px; font-family:inherit; font-size:0.82rem; cursor:pointer;
  }
  .btn:active{ transform:scale(0.96); }
  .btn.primary{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .btn.on{ background:var(--clay-deep); border-color:var(--clay-deep); color:#fff; }

  .cat-strip{
    display:flex; gap:8px; overflow-x:auto; padding:2px 16px 14px;
    scrollbar-width:none;
  }
  .cat-strip::-webkit-scrollbar{ display:none; }
  .cat-strip button{
    flex:0 0 auto; font-family:inherit; font-size:0.78rem; letter-spacing:0.02em;
    padding:7px 15px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .cat-strip button.active{ background:var(--clay); border-color:var(--clay); color:#fff; box-shadow:var(--shadow); }

  .grid{
    display:grid; grid-template-columns:repeat(2, 1fr); gap:16px;
    padding:6px 18px 30px; max-width:640px; margin:0 auto;
  }
  @media(min-width:480px){ .grid{ grid-template-columns:repeat(3, 1fr); } }

  .item{
    background:var(--card); border-radius:22px; overflow:hidden;
    box-shadow:var(--shadow); border:1px solid var(--line); cursor:pointer;
    position:relative; transition:transform .15s ease;
  }
  .item:active{ transform:scale(0.97); }
  .item img{ width:100%; aspect-ratio:1/1; object-fit:cover; display:block; background:var(--paper-warm); }
  .item .cap{ padding:9px 10px 4px; font-size:0.83rem; text-align:center; line-height:1.35;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .item .cat-tag{ text-align:center; font-size:0.62rem; color:var(--ink-soft); padding:0 8px 10px; }
  .item .del-x{
    position:absolute; top:-6px; right:-6px; width:26px; height:26px; border-radius:50%;
    background:var(--clay-deep); color:#fff; border:2px solid var(--paper); font-size:0.8rem; cursor:pointer;
  }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--ink-soft); grid-column:1/-1; }
  .empty-state img{ width:110px; height:110px; margin-bottom:10px; }
  .empty-state p{ font-size:0.85rem; line-height:1.8; }

  /* Modal */
  .overlay{ position:fixed; inset:0; background:rgba(62,58,50,0.35); display:none; align-items:flex-end; justify-content:center; z-index:60; }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--paper); width:100%; max-width:460px; border-radius:22px 22px 0 0;
    padding:20px 20px 26px; max-height:90vh; overflow-y:auto;
    box-shadow:0 -8px 26px rgba(0,0,0,0.18); animation:up .22s ease;
  }
  @keyframes up{ from{ transform:translateY(30px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal h3{ margin:0 0 14px; font-size:1.05rem; text-align:center; color:var(--sage-deep); }
  label.fl{ display:block; font-size:0.75rem; color:var(--ink-soft); letter-spacing:0.05em; margin:14px 0 6px; }
  input[type=text]{
    width:100%; font-family:inherit; font-size:0.9rem; padding:10px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--ink);
  }
  input:focus{ outline:2px solid var(--sage); outline-offset:1px; }
  .cover-pick{ display:flex; gap:14px; align-items:flex-start; margin-top:8px; }
  .cover-preview-wrap{
    width:120px; height:120px; border-radius:16px; overflow:hidden;
    border:1px solid var(--line); background:var(--paper-warm); flex:0 0 auto;
  }
  .cover-preview{
    width:100%; height:100%; object-fit:cover; display:block;
    cursor:grab; touch-action:none; user-select:none; -webkit-user-drag:none;
  }
  .cover-preview.dragging{ cursor:grabbing; }
  .hint{ font-size:0.7rem; color:var(--ink-soft); line-height:1.6; margin-top:4px; }
  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .modal-actions button{
    flex:1; font-family:inherit; font-size:0.85rem; padding:11px; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep); cursor:pointer;
  }
  .modal-actions .primary{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .modal-actions .danger{ border-color:#d99a91; color:#a95a4d; }

  .storage-note{ text-align:center; font-size:0.68rem; color:var(--ink-soft); padding:16px 20px 0; }
  #importFile{ display:none; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--sage-deep); color:#fff; padding:10px 20px; border-radius:999px;
    font-size:0.8rem; box-shadow:var(--shadow); z-index:100; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .toast.show{ opacity:1; }

  /* 內嵌瀏覽（可快速返回） */
  .viewer{
    position:fixed; inset:0; background:var(--paper); z-index:80;
    display:none; flex-direction:column;
  }
  .viewer.show{ display:flex; }
  .viewer-bar{
    display:flex; align-items:center; gap:8px; padding:10px 12px;
    background:var(--paper-warm); border-bottom:1px solid var(--line);
  }
  .viewer-bar .vtitle{
    flex:1; font-size:0.82rem; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .viewer-bar button{
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep);
    border-radius:999px; padding:7px 14px; font-family:inherit; font-size:0.78rem; cursor:pointer; white-space:nowrap;
  }
  .viewer iframe{ flex:1; width:100%; border:none; background:#fff; }
</style>
</head>

  <h1>我 的 捷 徑</h1>
  <p>點圖片，直接到網頁</p>
</header>

<div class="toolbar">
  <div class="search-box"><span>🔍</span><input type="text" id="searchInput" placeholder="搜尋..."></div>
  <button class="btn primary" id="addBtn">＋ 新增</button>
  <button class="btn" id="editModeBtn">✏️ 編輯</button>
  <button class="btn" id="exportBtn">匯出</button>
  <button class="btn" id="importBtn">匯入</button>
  <input type="file" id="importFile" accept="application/json">
</div>

<div class="cat-strip" id="catStrip"></div>

<div class="grid" id="grid"></div>
<p class="storage-note" id="storageNote"></p>

<div class="overlay" id="editorOverlay">
  <div class="modal">
    <h3 id="modalTitle">新增捷徑</h3>

    <label class="fl">名稱</label>
    <input type="text" id="fTitle" placeholder="例如：學校聯絡簿系統">

    <label class="fl">分類</label>
    <select id="fCategory" style="width:100%; font-family:inherit; font-size:0.9rem; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:var(--card); color:var(--ink);"></select>

    <label class="fl">網址（點圖片後會打開這個網頁）</label>
    <input type="text" id="fUrl" placeholder="https://...">

    <label class="fl">封面圖片</label>
    <div class="cover-pick">
      <div class="cover-preview-wrap">
        <img id="coverPreview" class="cover-preview" src="">
      </div>
      <div style="flex:1;">
        <input type="file" id="fCoverFile" accept="image/*">
        <div class="hint">直接從相簿選照片即可，會自動壓縮存在手機本機。沒有上傳的話會自動配一張插畫封面。<br>📌 <b>手指按住照片拖曳</b>，可以調整要顯示的位置。</div>
        <button type="button" class="btn" id="resetPosBtn" style="margin-top:8px; font-size:0.72rem; padding:5px 12px;">重設置中位置</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="primary" id="saveBtn">儲存</button>
      <button class="danger" id="deleteBtn" style="display:none;">刪除</button>
      <button id="cancelBtn">取消</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="viewer" id="viewer">
  <div class="viewer-bar">
    <button id="viewerBack">← 返回</button>
    <div class="vtitle" id="viewerTitle"></div>
    <button id="viewerOpenExternal">瀏覽器開啟 ↗</button>
  </div>
  <iframe id="viewerFrame" src="about:blank"></iframe>
</div>

<script>
const DB_NAME = "quickLinksDB";
const DB_STORE = "kv";
const LEGACY_KEY = "quickLinksItems_v1"; // 舊版 localStorage 資料，會自動搬過來

function idbOpen(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(DB_STORE);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}

async function loadItems(){
  try{
    const fromDb = await idbGet("items");
    if(fromDb) return fromDb;
  }catch(e){ /* IndexedDB 不可用時，往下用舊資料或種子資料 */ }

  // 搬移舊版 localStorage 資料（若存在）
  try{
    const legacy = localStorage.getItem(LEGACY_KEY);
    if(legacy){
      const parsed = JSON.parse(legacy);
      await idbSet("items", parsed);
      localStorage.removeItem(LEGACY_KEY);
      return parsed;
    }
  }catch(e){}
  return null;
}
async function saveItems(){
  await idbSet("items", items);
  updateStorageNote();
}
async function updateStorageNote(){
  const bytes = new Blob([JSON.stringify(items)]).size;
  let extra = "";
  if(navigator.storage && navigator.storage.estimate){
    try{
      const est = await navigator.storage.estimate();
      if(est.quota){
        extra = `（裝置可用空間約 ${(est.quota/1024/1024).toFixed(0)} MB，非常充足）`;
      }
    }catch(e){}
  }
  document.getElementById("storageNote").textContent =
    `共 ${items.length} 個捷徑・資料約 ${(bytes/1024).toFixed(0)} KB ${extra}`;
}

const CATEGORIES = [
  {id:"web",   label:"網頁工具",   icon:"🌐"},
  {id:"video", label:"影片",       icon:"🎬"},
  {id:"game",  label:"遊戲/練習",  icon:"🎲"},
  {id:"study", label:"學習資源",   icon:"📖"},
  {id:"life",  label:"生活",       icon:"🌿"},
  {id:"other", label:"其他",       icon:"📌"},
];
function catOf(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }
function isVideoUrl(url){
  return /youtube\.com|youtu\.be|vimeo\.com|bilibili\.com/i.test(url||"");
}

function seedItems(){
  return [
    { id:"s1", title:"Google", url:"https://www.google.com", image:null, category:"web", createdAt:Date.now() },
    { id:"s2", title:"YouTube", url:"https://www.youtube.com", image:null, category:"video", createdAt:Date.now() }
  ];
}
let items = [];

/* 自動封面（沒上傳照片時使用） */
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function autoCover(title){
  title = title || "捷徑";
  const palettes = [["#F3ECDD","#D9CBA9"],["#E9E3D2","#C9B999"],["#EFE3DE","#D8B7AC"],["#E4E9DA","#B7C6A3"],["#E7E1EC","#C1B2D6"],["#F0E6D8","#D3B98E"]];
  const [c1,c2] = palettes[hashStr(title) % palettes.length];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>
    </linearGradient></defs>
    <rect width="400" height="400" fill="url(#g)"/>
    <text x="50%" y="56%" font-size="150" text-anchor="middle" dominant-baseline="middle">🔗</text>
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

function compressImage(file, maxDim=640, quality=0.6){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function escapeHtml(str){ const d=document.createElement("div"); d.textContent=str||""; return d.innerHTML; }

let editMode = false;
let searchTerm = "";
let activeCategory = "all";

function renderCatStrip(){
  const strip = document.getElementById("catStrip");
  const chips = [{id:"all", label:"全部", icon:"✨"}, ...CATEGORIES];
  strip.innerHTML = chips.map(c=>
    `<button data-id="${c.id}" class="${activeCategory===c.id?'active':''}">${c.icon} ${c.label}</button>`
  ).join("");
  strip.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{
      activeCategory = b.dataset.id;
      renderCatStrip();
      renderGrid();
    });
  });
}

document.getElementById("editModeBtn").addEventListener("click", ()=>{
  editMode = !editMode;
  const b = document.getElementById("editModeBtn");
  b.classList.toggle("on", editMode);
  b.textContent = editMode ? "✓ 編輯中" : "✏️ 編輯";
  renderGrid();
});
document.getElementById("searchInput").addEventListener("input", e=>{
  searchTerm = e.target.value.trim().toLowerCase();
  renderGrid();
});

function renderGrid(){
  const grid = document.getElementById("grid");
  let list = items;
  if(activeCategory !== "all") list = list.filter(it=> (it.category||"other") === activeCategory);
  if(searchTerm) list = list.filter(it=>it.title.toLowerCase().includes(searchTerm));

  if(list.length === 0){
    const mascotSrc = document.querySelector(".mascot").src;
    grid.innerHTML = `<div class="empty-state">
      <img src="${mascotSrc}" alt="">
      <p>這裡還沒有捷徑，點上面「＋ 新增」<br>加入你常用的網頁吧</p></div>`;
    updateStorageNote();
    return;
  }

  grid.innerHTML = list.map(it=>{
    const cover = it.image || autoCover(it.title);
    const pos = it.image && it.pos ? `${it.pos.x}% ${it.pos.y}%` : "50% 50%";
    const cat = catOf(it.category || "other");
    return `<div class="item" data-id="${it.id}">
      ${editMode ? `<span class="del-x" data-id="${it.id}">✕</span>` : ""}
      <img src="${cover}" style="object-position:${pos};" loading="lazy">
      <div class="cap">${escapeHtml(it.title)}</div>
      <div class="cat-tag">${cat.icon} ${cat.label}</div>
    </div>`;
  }).join("");

  grid.querySelectorAll(".item").forEach(el=>{
    el.addEventListener("click", (e)=>{
      if(e.target.classList.contains("del-x")) return;
      const id = el.dataset.id;
      const it = items.find(x=>x.id===id);
      if(editMode){ openEditor(id); return; }
      if(it.url) openViewer(it);
      else openEditor(id);
    });
  });
  grid.querySelectorAll(".del-x").forEach(x=>{
    x.addEventListener("click", async (e)=>{
      e.stopPropagation();
      if(confirm("確定刪除這個捷徑嗎？")){
        items = items.filter(it=>it.id!==x.dataset.id);
        await saveItems(); renderGrid();
        showToast("已刪除");
      }
    });
  });
  updateStorageNote();
}

/* 內嵌瀏覽：點卡片直接在 App 內開啟，右上角一鍵就能返回 */
function openViewer(it){
  document.getElementById("viewerTitle").textContent = it.title;
  document.getElementById("viewerFrame").src = it.url;
  document.getElementById("viewerOpenExternal").onclick = ()=> window.open(it.url, "_blank");
  document.getElementById("viewer").classList.add("show");
}
document.getElementById("viewerBack").addEventListener("click", ()=>{
  document.getElementById("viewer").classList.remove("show");
  document.getElementById("viewerFrame").src = "about:blank";
});

/* 新增／編輯 */
let editingId = null;
let editImage = null;
let editPos = {x:50, y:50};

function applyPreviewPosition(){
  document.getElementById("coverPreview").style.objectPosition = `${editPos.x}% ${editPos.y}%`;
}

(function setupDrag(){
  const img = document.getElementById("coverPreview");
  let dragging = false, startX = 0, startY = 0, startPos = {x:50,y:50};

  function onDown(clientX, clientY){
    dragging = true;
    startX = clientX; startY = clientY;
    startPos = {...editPos};
    img.classList.add("dragging");
  }
  function onMove(clientX, clientY){
    if(!dragging) return;
    const rect = img.getBoundingClientRect();
    const dxPercent = ((clientX - startX) / rect.width) * 100;
    const dyPercent = ((clientY - startY) / rect.height) * 100;
    editPos.x = Math.max(0, Math.min(100, startPos.x - dxPercent));
    editPos.y = Math.max(0, Math.min(100, startPos.y - dyPercent));
    applyPreviewPosition();
  }
  function onUp(){ dragging = false; img.classList.remove("dragging"); }

  img.addEventListener("pointerdown", e=>{ img.setPointerCapture(e.pointerId); onDown(e.clientX, e.clientY); });
  img.addEventListener("pointermove", e=> onMove(e.clientX, e.clientY));
  img.addEventListener("pointerup", onUp);
  img.addEventListener("pointercancel", onUp);
})();

document.getElementById("resetPosBtn").addEventListener("click", ()=>{
  editPos = {x:50, y:50};
  applyPreviewPosition();
});

function fillCategorySelect(){
  document.getElementById("fCategory").innerHTML = CATEGORIES.map(c=>
    `<option value="${c.id}">${c.icon} ${c.label}</option>`
  ).join("");
}

function openEditor(id){
  editingId = id || null;
  const it = id ? items.find(x=>x.id===id) : null;
  document.getElementById("modalTitle").textContent = it ? "編輯捷徑" : "新增捷徑";
  document.getElementById("fTitle").value = it ? it.title : "";
  document.getElementById("fCategory").value = it ? (it.category || "other") : "web";
  document.getElementById("fUrl").value = it ? it.url : "";
  editImage = it ? it.image : null;
  editPos = it && it.pos ? {...it.pos} : {x:50, y:50};
  document.getElementById("coverPreview").src = editImage || autoCover(it ? it.title : "");
  applyPreviewPosition();
  document.getElementById("fCoverFile").value = "";
  document.getElementById("deleteBtn").style.display = it ? "inline-block" : "none";
  document.getElementById("editorOverlay").classList.add("show");
}
function closeEditor(){ document.getElementById("editorOverlay").classList.remove("show"); }

document.getElementById("fTitle").addEventListener("input", e=>{
  if(!editImage) document.getElementById("coverPreview").src = autoCover(e.target.value);
});
document.getElementById("fUrl").addEventListener("input", e=>{
  if(!editingId && isVideoUrl(e.target.value)){
    document.getElementById("fCategory").value = "video";
  }
});
document.getElementById("fCoverFile").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  showToast("圖片壓縮中...");
  editImage = await compressImage(file);
  editPos = {x:50, y:50};
  document.getElementById("coverPreview").src = editImage;
  applyPreviewPosition();
  showToast("封面已更新，可拖曳調整位置");
});

document.getElementById("addBtn").addEventListener("click", ()=> openEditor(null));
document.getElementById("cancelBtn").addEventListener("click", closeEditor);

document.getElementById("saveBtn").addEventListener("click", async ()=>{
  const title = document.getElementById("fTitle").value.trim();
  if(!title){ alert("請輸入名稱"); return; }
  let url = document.getElementById("fUrl").value.trim();
  if(url && !/^https?:\/\//i.test(url)) url = "https://" + url;
  const category = document.getElementById("fCategory").value;

  if(editingId){
    const it = items.find(x=>x.id===editingId);
    it.title = title; it.url = url; it.image = editImage; it.pos = editPos; it.category = category;
  }else{
    items.push({ id:"i"+Date.now()+Math.random().toString(16).slice(2), title, url, image:editImage, pos:editPos, category, createdAt:Date.now() });
  }
  try{ await saveItems(); }
  catch(err){ alert("儲存失敗，請先匯出備份、刪除幾張照片再試一次。"); return; }
  renderCatStrip(); renderGrid(); closeEditor();
  showToast("已儲存");
});
document.getElementById("deleteBtn").addEventListener("click", async ()=>{
  if(!editingId) return;
  if(confirm("確定刪除這個捷徑嗎？")){
    items = items.filter(x=>x.id!==editingId);
    await saveItems(); renderGrid(); closeEditor();
    showToast("已刪除");
  }
});

/* 匯出／匯入 */
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const blob = new Blob([JSON.stringify(items,null,0)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  a.href = url; a.download = `我的捷徑備份_${stamp}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast("已匯出備份檔");
});
document.getElementById("importBtn").addEventListener("click", ()=> document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async evt=>{
    let imported;
    try{ imported = JSON.parse(evt.target.result); }
    catch(err){ alert("檔案格式錯誤，無法匯入。"); return; }
    if(!Array.isArray(imported)){ alert("檔案內容不是有效的備份格式。"); return; }
    const mode = confirm("按「確定」＝合併到現有捷徑\n按「取消」＝清空後改用匯入的內容");
    if(mode){
      const existingIds = new Set(items.map(x=>x.id));
      imported.forEach(it=>{ if(!existingIds.has(it.id)) items.push(it); });
    }else{ items = imported; }
    await saveItems(); renderGrid();
    showToast("匯入完成");
  };
  reader.readAsText(file);
  e.target.value = "";
});

let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1700);
}

(async function init(){
  fillCategorySelect();
  renderCatStrip();
  const loaded = await loadItems();
  items = loaded !== null ? loaded : seedItems();
  if(loaded === null) await saveItems();
  renderGrid();
  updateStorageNote();
})();
</script>
</body>
</html>
