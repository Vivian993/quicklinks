<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>我的捷徑</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的捷徑">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#F6EFE3">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<style>
  :root{
    --paper:#F6EFE3; --paper-warm:#EFE6D4; --card:#FDFBF6;
    --ink:#413B31; --ink-soft:#948A78;
    --sage:#7C9270; --sage-deep:#5F7358;
    --clay:#E6A497; --clay-deep:#C97F6E;
    --line:#E7DCC8; --shadow:0 8px 20px rgba(150,110,80,0.14);
  }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    background: radial-gradient(circle at 12% 8%, rgba(255,255,255,0.6), transparent 42%), var(--paper);
    color:var(--ink); font-family:"Noto Serif TC","PMingLiU","Georgia",serif;
    min-height:100vh; -webkit-font-smoothing:antialiased; padding-bottom:60px;
  }
  header.top{ padding:24px 20px 6px; text-align:center; }
  header.top .mascot{ width:52px; height:52px; margin:0 auto 4px; display:block; }
  header.top h1{ font-size:1.35rem; font-weight:600; letter-spacing:0.14em; margin:0 0 4px; color:var(--sage-deep); }
  header.top p{ margin:0; font-size:0.74rem; letter-spacing:0.1em; color:var(--ink-soft); }

  .toolbar{
    display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center;
    padding:14px 16px 8px;
  }
  .search-box{
    display:flex; align-items:center; gap:6px; background:var(--card);
    border:1px solid var(--line); border-radius:999px; padding:7px 14px; min-width:150px; max-width:220px;
  }
  .search-box input{ border:none; outline:none; background:transparent; font-family:inherit; font-size:0.85rem; width:100%; color:var(--ink); }
  .btn{
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep);
    border-radius:999px; padding:8px 16px; font-family:inherit; font-size:0.82rem; cursor:pointer;
  }
  .btn:active{ transform:scale(0.96); }
  .btn.primary{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .btn.on{ background:var(--clay-deep); border-color:var(--clay-deep); color:#fff; }

  .cat-strip-row{ display:flex; align-items:center; gap:6px; padding:2px 16px 4px; }
  .cat-strip{ display:flex; gap:8px; overflow-x:auto; padding:2px 0 10px; scrollbar-width:none; flex:1; }
  .cat-strip::-webkit-scrollbar{ display:none; }
  .cat-strip button{
    flex:0 0 auto; font-family:inherit; font-size:0.78rem; letter-spacing:0.02em;
    padding:7px 15px; border-radius:999px; border:1px solid var(--line);
    background:var(--card); color:var(--ink-soft); cursor:pointer; white-space:nowrap;
  }
  .cat-strip button.active{ color:#fff; box-shadow:var(--shadow); border-color:transparent; }
  .gear-btn{
    flex:0 0 auto; width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:var(--card); font-size:0.95rem; cursor:pointer; margin-bottom:10px;
  }

  .hint-note{ text-align:center; font-size:0.68rem; color:var(--ink-soft); padding:0 20px 10px; }

  .list{ display:flex; flex-direction:column; gap:10px; padding:6px 16px 30px; max-width:640px; margin:0 auto; }

  .row-card{
    display:flex; gap:12px; align-items:flex-start; background:var(--card);
    border-radius:20px; padding:12px; box-shadow:var(--shadow); border:1px solid var(--line);
    cursor:pointer; position:relative; transition:transform .12s ease, box-shadow .12s ease;
  }
  .row-card.dragging{ opacity:0.92; transform:scale(1.02); box-shadow:0 14px 26px rgba(0,0,0,0.22); z-index:5; }
  .row-card .thumb{
    width:60px; height:60px; border-radius:50%; overflow:hidden; flex:0 0 auto;
    border:2px solid #fff; box-shadow:0 2px 6px rgba(90,70,40,0.18); background:var(--paper-warm);
  }
  .row-card .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }
  .row-card .content{ flex:1; min-width:0; padding-top:2px; }
  .row-card .content h3{ margin:0 0 3px; font-size:0.94rem; font-weight:600; color:var(--ink); line-height:1.35; }
  .row-card .content .note{
    font-size:0.75rem; color:var(--ink-soft); line-height:1.55; margin:0 0 6px;
    display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  }
  .row-card .tags{ display:flex; flex-wrap:wrap; gap:5px; }
  .row-card .tag{
    font-size:0.62rem; padding:3px 9px; border-radius:999px; color:#fff; font-weight:600; letter-spacing:0.02em;
  }
  .row-card .chevron{ align-self:center; color:var(--clay-deep); font-size:1.05rem; flex:0 0 auto; padding-left:2px; }
  .row-card .del-x{
    position:absolute; top:-7px; right:-7px; width:26px; height:26px; border-radius:50%;
    background:var(--clay-deep); color:#fff; border:2px solid var(--paper); font-size:0.78rem; cursor:pointer; z-index:2;
  }

  .empty-state{ text-align:center; padding:50px 20px; color:var(--ink-soft); }
  .empty-state img{ width:100px; height:100px; margin-bottom:10px; }
  .empty-state p{ font-size:0.85rem; line-height:1.8; }

  /* Modal (共用：新增/編輯、分類管理) */
  .overlay{ position:fixed; inset:0; background:rgba(62,58,50,0.35); display:none; align-items:flex-end; justify-content:center; z-index:60; }
  .overlay.show{ display:flex; }
  .modal{
    background:var(--paper); width:100%; max-width:480px; border-radius:22px 22px 0 0;
    padding:20px 20px calc(26px + env(safe-area-inset-bottom)); max-height:90vh; overflow-y:auto;
    box-shadow:0 -8px 26px rgba(0,0,0,0.18); animation:up .22s ease;
  }
  @keyframes up{ from{ transform:translateY(30px); opacity:0;} to{ transform:translateY(0); opacity:1;} }
  .modal h3{ margin:0 0 14px; font-size:1.05rem; text-align:center; color:var(--sage-deep); }
  label.fl{ display:block; font-size:0.75rem; color:var(--ink-soft); letter-spacing:0.05em; margin:14px 0 6px; }
  input[type=text], select, textarea{
    width:100%; font-family:inherit; font-size:0.9rem; padding:10px 12px; border-radius:10px;
    border:1px solid var(--line); background:var(--card); color:var(--ink); resize:vertical;
  }
  textarea{ min-height:70px; line-height:1.6; }
  input:focus, select:focus, textarea:focus{ outline:2px solid var(--sage); outline-offset:1px; }
  .cover-pick{ display:flex; gap:14px; align-items:flex-start; margin-top:8px; }
  .cover-preview-wrap{
    width:110px; height:110px; border-radius:16px; overflow:hidden;
    border:1px solid var(--line); background:var(--paper-warm); flex:0 0 auto;
  }
  .cover-preview{ width:100%; height:100%; object-fit:cover; display:block; cursor:grab; touch-action:none; user-select:none; -webkit-user-drag:none; }
  .cover-preview.dragging{ cursor:grabbing; }
  .hint{ font-size:0.7rem; color:var(--ink-soft); line-height:1.6; margin-top:4px; }

  .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin-top:6px; }
  .chip-choice{
    font-family:inherit; font-size:0.78rem; padding:7px 14px; border-radius:999px;
    border:2px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer;
  }
  .chip-choice.selected{ color:#fff; border-color:transparent; }

  .toggle-row{ display:flex; align-items:center; gap:10px; margin-top:14px; font-size:0.8rem; color:var(--ink); }
  .toggle-row input{ width:18px; height:18px; }

  .modal-actions{ display:flex; gap:10px; margin-top:22px; }
  .modal-actions button{
    flex:1; font-family:inherit; font-size:0.85rem; padding:11px; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep); cursor:pointer;
  }
  .modal-actions .primary{ background:var(--sage); border-color:var(--sage); color:#fff; }
  .modal-actions .danger{ border-color:#d99a91; color:#a95a4d; }

  .catlist-row{
    display:flex; align-items:center; gap:10px; padding:9px 10px; border:1px solid var(--line);
    border-radius:12px; margin-bottom:8px; background:var(--card);
  }
  .catlist-row .swatch{ width:26px; height:26px; border-radius:50%; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:0.85rem; }
  .catlist-row .lbl{ flex:1; font-size:0.85rem; }
  .catlist-row .rm{ border:none; background:none; color:var(--clay-deep); font-size:0.85rem; cursor:pointer; }

  .storage-note{ text-align:center; font-size:0.66rem; color:var(--ink-soft); padding:16px 20px 0; }
  #importFile{ display:none; }
  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--sage-deep); color:#fff; padding:10px 20px; border-radius:999px;
    font-size:0.8rem; box-shadow:var(--shadow); z-index:100; opacity:0; pointer-events:none; transition:opacity .3s;
  }
  .toast.show{ opacity:1; }

  /* 內嵌瀏覽（可快速返回，含安全區域修正） */
  .viewer{ position:fixed; inset:0; background:var(--paper); z-index:80; display:none; flex-direction:column; }
  .viewer.show{ display:flex; }
  .viewer-bar{
    display:flex; align-items:center; gap:8px;
    padding:calc(10px + env(safe-area-inset-top)) 12px 10px;
    background:var(--paper-warm); border-bottom:1px solid var(--line);
  }
  .viewer-bar .vtitle{ flex:1; font-size:0.82rem; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .viewer-bar button{
    border:1px solid var(--line); background:var(--card); color:var(--sage-deep);
    border-radius:999px; padding:7px 14px; font-family:inherit; font-size:0.78rem; cursor:pointer; white-space:nowrap;
  }
  .viewer iframe{ flex:1; width:100%; border:none; background:#fff; }
</style>
</head>

<script>
/* =================== 固定科目標籤（不可刪除，可複選） =================== */
const SUBJECTS = [
  {id:"chinese", label:"國文", color:"#D97B6C"},
  {id:"english", label:"英文", color:"#5B8FC7"},
  {id:"math",    label:"數學", color:"#C79A3F"},

  {id:"social",  label:"社會", color:"#9B7FC0"},
];
function subjectOf(id){ return SUBJECTS.find(s=>s.id===id); }

const DEFAULT_CATEGORIES = [
  {id:"web",   label:"網頁工具",   icon:"🌐", color:"#6C9BD9"},
  {id:"video", label:"影片",       icon:"🎬", color:"#E8896B"},
  {id:"game",  label:"遊戲/練習",  icon:"🎲", color:"#D9A93F"},
  {id:"study", label:"學習資源",   icon:"📖", color:"#7C9270"},
  {id:"life",  label:"生活",       icon:"🌿", color:"#6FBF9A"},
  {id:"other", label:"其他",       icon:"📌", color:"#A98FC9"},
];
const CAT_ICON_CHOICES = ["🌐","🎬","🎲","📖","🌿","📌","🎨","📋","🔖","📱","💰","📓","🧩","🎵","🏛️","🧮","🔬","☁️","📷","🤖"];
const CAT_COLOR_CHOICES = ["#6C9BD9","#E8896B","#D9A93F","#7C9270","#6FBF9A","#A98FC9","#D97B6C","#9B7FC0","#4FA37A","#C97F6E"];

let CATEGORIES = [];
function catOf(id){ return CATEGORIES.find(c=>c.id===id) || CATEGORIES[CATEGORIES.length-1]; }
function isVideoUrl(url){ return /youtube\.com|youtu\.be|vimeo\.com|bilibili\.com/i.test(url||""); }

/* =================== IndexedDB 儲存層 =================== */
const DB_NAME = "quickLinksDB";
const DB_STORE = "kv";
const LEGACY_KEY = "quickLinksItems_v1";

function idbOpen(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(DB_STORE);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE, "readonly");
    const req = tx.objectStore(DB_STORE).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function idbSet(key, value){
  const db = await idbOpen();
  return new Promise((resolve, reject)=>{
    const tx = db.transaction(DB_STORE, "readwrite");
    tx.objectStore(DB_STORE).put(value, key);
    tx.oncomplete = ()=> resolve(true);
    tx.onerror = ()=> reject(tx.error);
  });
}

async function loadItems(){
  try{
    const fromDb = await idbGet("items");
    if(fromDb) return fromDb;
  }catch(e){}
  try{
    const legacy = localStorage.getItem(LEGACY_KEY);
    if(legacy){
      const parsed = JSON.parse(legacy);
      await idbSet("items", parsed);
      localStorage.removeItem(LEGACY_KEY);
      return parsed;
    }
  }catch(e){}
  return null;
}
async function saveItems(){ await idbSet("items", items); updateStorageNote(); }

async function loadCategories(){
  try{ const fromDb = await idbGet("categories"); if(fromDb && fromDb.length) return fromDb; }catch(e){}
  return null;
}
async function saveCategories(){ await idbSet("categories", CATEGORIES); }

async function updateStorageNote(){
  const bytes = new Blob([JSON.stringify(items)]).size;
  let extra = "";
  if(navigator.storage && navigator.storage.estimate){
    try{
      const est = await navigator.storage.estimate();
      if(est.quota) extra = `（裝置可用空間約 ${(est.quota/1024/1024).toFixed(0)} MB）`;
    }catch(e){}
  }
  document.getElementById("storageNote").textContent = `共 ${items.length} 個捷徑・資料約 ${(bytes/1024).toFixed(0)} KB ${extra}`;
}

function seedItems(){
  return [
    { id:"s1", title:"Google", url:"https://www.google.com", image:null, category:"web", subjects:[], note:"", openMode:"external", order:1, createdAt:Date.now() },
    { id:"s2", title:"YouTube", url:"https://www.youtube.com", image:null, category:"video", subjects:[], note:"", openMode:"external", order:2, createdAt:Date.now() }
  ];
}
let items = [];

/* =================== 自動封面（多樣可愛版） =================== */
const KEYWORD_MAP = [
  [["遊戲","攻略","王國","傳說","任務","副本","裝備"], "🎮"],
  [["咖啡","料理","食譜","煮","烘焙","飲料"], "☕"],
  [["運動","跑步","健身","瑜珈","訓練"], "🏃"],
  [["音樂","樂器","歌","演奏"], "🎵"],
  [["電影","影集","戲劇","影片","YouTube"], "🎬"],
  [["書","閱讀","小說","筆記"], "📖"],
  [["旅遊","旅行","景點","機票"], "✈️"],
  [["理財","存錢","投資","記帳"], "💰"],
  [["健康","醫療","保健","睡眠"], "🩺"],
  [["3C","科技","電腦","軟體","程式","Code"], "💻"],
  [["植物","園藝","花","盆栽"], "🌿"],
  [["雲端","雲","Drive","檔案"], "☁️"],
  [["相機","照片","圖片","影像"], "📷"],
  [["教學","老師","課程"], "🍎"],
  [["地圖","導航"], "🗺️"],
  [["機器人","AI","智慧"], "🤖"],
  [["心理","測驗","命理","八字"], "🔮"],
  [["法律","諮詢","會議"], "⚖️"],
  [["簡報","投影片","PPT"], "📊"],
  [["益智","拼圖","邏輯"], "🧩"],
  [["動物","貓","狗","寵物"], "🐾"],
  [["國文","中文","漢字","成語"], "📝"],
  [["英文","單字","聽力"], "🔤"],
  [["數學","計算"], "🧮"],
  [["自然","科學","實驗"], "🔬"],
  [["社會","歷史","地理"], "🏛️"],
];
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function autoCover(title, categoryId){
  title = title || "捷徑";
  let emoji = null;
  for(const [words, e] of KEYWORD_MAP){ if(words.some(w=> title.includes(w))){ emoji = e; break; } }
  if(!emoji) emoji = catOf(categoryId||"other").icon;
  const palettes = [["#F3ECDD","#D9CBA9"],["#E9E3D2","#C9B999"],["#EFE3DE","#D8B7AC"],["#E4E9DA","#B7C6A3"],["#E7E1EC","#C1B2D6"],["#F0E6D8","#D3B98E"],["#EAD9DD","#CBA6AE"],["#DCE9E4","#A9C7BA"]];
  const [c1,c2] = palettes[hashStr(title+categoryId) % palettes.length];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
    <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>
    </linearGradient></defs>
    <circle cx="100" cy="100" r="100" fill="url(#g)"/>
    <text x="50%" y="56%" font-size="88" text-anchor="middle" dominant-baseline="middle">${emoji}</text>
  </svg>`;
  return "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
}

function compressImage(file, maxDim=640, quality=0.6){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let {width, height} = img;
        if(width > height && width > maxDim){ height = Math.round(height*maxDim/width); width = maxDim; }
        else if(height > maxDim){ width = Math.round(width*maxDim/height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function escapeHtml(str){ const d=document.createElement("div"); d.textContent=str||""; return d.innerHTML; }

/* =================== 狀態 =================== */
let editMode = false;
let searchTerm = "";
let activeCategory = "all";

document.getElementById("editModeBtn").addEventListener("click", ()=>{
  editMode = !editMode;
  const b = document.getElementById("editModeBtn");
  b.classList.toggle("on", editMode);
  b.textContent = editMode ? "✓ 編輯中" : "✏️ 編輯";
  document.getElementById("editHint").style.display = editMode ? "block" : "none";
  renderList();
});
document.getElementById("searchInput").addEventListener("input", e=>{
  searchTerm = e.target.value.trim().toLowerCase();
  renderList();
});

/* =================== 分類頁籤 =================== */
function renderCatStrip(){
  const strip = document.getElementById("catStrip");
  const chips = [{id:"all", label:"全部", icon:"✨", color:"#C97F6E"}, ...CATEGORIES];
  strip.innerHTML = chips.map(c=>{
    const active = activeCategory===c.id;
    return `<button data-id="${c.id}" class="${active?'active':''}" style="${active? `background:${c.color};`:''}">${c.icon} ${c.label}</button>`;
  }).join("");
  strip.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{ activeCategory = b.dataset.id; renderCatStrip(); renderList(); });
  });
}

/* =================== 清單渲染（含搜尋比對、拖曳排序） =================== */
function matchesSearch(it){
  const cat = catOf(it.category||"other");
  const subLabels = (it.subjects||[]).map(id=>{ const s=subjectOf(id); return s?s.label:""; }).join(" ");
  const hay = `${it.title} ${it.note||""} ${cat.label} ${subLabels}`.toLowerCase();
  return hay.includes(searchTerm);
}
function getVisibleList(){
  let list = items.slice();
  if(searchTerm){
    list = list.filter(matchesSearch);
  }else if(activeCategory !== "all"){
    list = list.filter(it => (it.category||"other") === activeCategory);
  }
  list.sort((a,b)=> (a.order ?? a.createdAt ?? 0) - (b.order ?? b.createdAt ?? 0));
  return list;
}

function renderList(){
  const listEl = document.getElementById("list");
  const list = getVisibleList();

  if(list.length === 0){
    const mascotSrc = document.querySelector(".mascot").src;
    listEl.innerHTML = `<div class="empty-state"><img src="${mascotSrc}" alt="">
      <p>這裡還沒有捷徑，點上面「＋ 新增」<br>加入你常用的網頁吧</p></div>`;
    updateStorageNote();
    return;
  }

  listEl.innerHTML = list.map(it=>{
    const cover = it.image || autoCover(it.title, it.category);
    const pos = it.image && it.pos ? `${it.pos.x}% ${it.pos.y}%` : "50% 50%";
    const cat = catOf(it.category || "other");
    const subjTags = (it.subjects||[]).map(id=>{
      const s = subjectOf(id);
      return s ? `<span class="tag" style="background:${s.color};">${s.label}</span>` : "";
    }).join("");
    return `<div class="row-card" data-id="${it.id}">
      ${editMode ? `<span class="del-x" data-id="${it.id}">✕</span>` : ""}
      <div class="thumb"><img src="${cover}" style="object-position:${pos};" loading="lazy"></div>
      <div class="content">
        <h3>${escapeHtml(it.title)}</h3>
        ${it.note ? `<div class="note">${escapeHtml(it.note)}</div>` : ""}
        <div class="tags">
          <span class="tag" style="background:${cat.color};">${cat.icon} ${cat.label}</span>
          ${subjTags}
          ${!it.url ? `<span class="tag" style="background:#B9AFA0;">尚未設定連結</span>` : ""}
          ${it.openMode==="external" ? `<span class="tag" style="background:#8B8272;">瀏覽器開啟</span>` : ""}
        </div>
      </div>
      <div class="chevron">${editMode ? "✎" : "›"}</div>
    </div>`;
  }).join("");

  listEl.querySelectorAll(".row-card").forEach(row=>{
    row.addEventListener("click", (e)=>{
      if(e.target.classList.contains("del-x")) return;
      if(row.dataset.justDragged){ delete row.dataset.justDragged; return; }
      const id = row.dataset.id;
      const it = items.find(x=>x.id===id);
      if(editMode){ openEditor(id); return; }
      if(it.url){
        if(it.openMode === "external") window.open(it.url, "_blank");
        else openViewer(it);
      }else{
        openEditor(id);
      }
    });
  });
  listEl.querySelectorAll(".del-x").forEach(x=>{
    x.addEventListener("click", async (e)=>{
      e.stopPropagation();
      if(confirm("確定刪除這個捷徑嗎？")){
        items = items.filter(it=>it.id!==x.dataset.id);
        await saveItems(); renderList();
        showToast("已刪除");
      }
    });
  });
  updateStorageNote();
  setupDragReorder(listEl);
}

/* 長按拖曳排序（只在編輯模式生效） */
function setupDragReorder(container){
  let holdTimer=null, dragging=false, currentRow=null, startY=0, rowsInfo=[];

  container.onpointerdown = (e)=>{
    if(!editMode) return;
    const row = e.target.closest(".row-card");
    if(!row || e.target.classList.contains("del-x")) return;
    startY = e.clientY;
    clearTimeout(holdTimer);
    holdTimer = setTimeout(()=> beginDrag(row, e.pointerId), 380);

    const moveCheck = (ev)=>{
      if(dragging) return;
      if(Math.abs(ev.clientY - startY) > 10){ clearTimeout(holdTimer); cleanup(); }
    };
    const cleanup = ()=>{
      container.removeEventListener("pointermove", moveCheck);
      container.removeEventListener("pointerup", upOnce);
    };
    const upOnce = ()=>{ clearTimeout(holdTimer); cleanup(); };
    container.addEventListener("pointermove", moveCheck);
    container.addEventListener("pointerup", upOnce, {once:true});
  };

  function beginDrag(row, pointerId){
    dragging = true;
    currentRow = row;
    try{ row.setPointerCapture(pointerId); }catch(e){}
    row.classList.add("dragging");
    rowsInfo = [...container.querySelectorAll(".row-card")].map(r=>({ el:r, rect:r.getBoundingClientRect() }));
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp, {once:true});
  }
  function onMove(e){
    if(!dragging) return;
    const y = e.clientY;
    let newIndex = rowsInfo.findIndex(r => y < r.rect.top + r.rect.height/2);
    if(newIndex === -1) newIndex = rowsInfo.length - 1;
    const curIndex = rowsInfo.findIndex(r => r.el === currentRow);
    if(newIndex !== curIndex && newIndex !== -1){
      const moving = rowsInfo[curIndex];
      rowsInfo.splice(curIndex, 1);
      rowsInfo.splice(newIndex, 0, moving);
      if(newIndex < rowsInfo.length - 1) container.insertBefore(currentRow, rowsInfo[newIndex+1].el);
      else container.appendChild(currentRow);
      rowsInfo.forEach(r => r.rect = r.el.getBoundingClientRect());
    }
  }
  async function onUp(){
    dragging = false;
    document.removeEventListener("pointermove", onMove);
    if(currentRow){
      currentRow.classList.remove("dragging");
      currentRow.dataset.justDragged = "1";
      const ids = [...container.querySelectorAll(".row-card")].map(r=>r.dataset.id);
      ids.forEach((id, idx)=>{ const it = items.find(x=>x.id===id); if(it) it.order = idx; });
      await saveItems();
    }
    currentRow = null;
  }
}

/* =================== 內嵌瀏覽（快速返回） =================== */
function openViewer(it){
  document.getElementById("viewerTitle").textContent = it.title;
  document.getElementById("viewerFrame").src = it.url;
  document.getElementById("viewerOpenExternal").onclick = ()=> window.open(it.url, "_blank");
  document.getElementById("viewer").classList.add("show");
}
document.getElementById("viewerBack").addEventListener("click", ()=>{
  document.getElementById("viewer").classList.remove("show");
  document.getElementById("viewerFrame").src = "about:blank";
});

/* =================== 新增／編輯 =================== */
let editingId = null;
let editImage = null;
let editPos = {x:50, y:50};
let editSubjects = new Set();

function fillCategorySelect(){
  document.getElementById("fCategory").innerHTML = CATEGORIES.map(c=>`<option value="${c.id}">${c.icon} ${c.label}</option>`).join("");
}
function renderSubjectChips(){
  const row = document.getElementById("subjectChips");
  row.innerHTML = SUBJECTS.map(s=>`<div class="chip-choice" data-id="${s.id}" style="border-color:${s.color};">${s.label}</div>`).join("");
  row.querySelectorAll(".chip-choice").forEach(chip=>{
    chip.addEventListener("click", ()=>{
      const id = chip.dataset.id;
      if(editSubjects.has(id)) editSubjects.delete(id); else editSubjects.add(id);
      markSubjectChips();
    });
  });
}
function markSubjectChips(){
  document.querySelectorAll("#subjectChips .chip-choice").forEach(chip=>{
    const s = subjectOf(chip.dataset.id);
    const on = editSubjects.has(chip.dataset.id);
    chip.classList.toggle("selected", on);
    chip.style.background = on ? s.color : "";
  });
}

function applyPreviewPosition(){ document.getElementById("coverPreview").style.objectPosition = `${editPos.x}% ${editPos.y}%`; }

(function setupDrag(){
  const img = document.getElementById("coverPreview");
  let dragging=false, startX=0, startY=0, startPos={x:50,y:50};
  img.addEventListener("pointerdown", e=>{
    dragging = true; img.setPointerCapture(e.pointerId);
    startX=e.clientX; startY=e.clientY; startPos={...editPos};
    img.classList.add("dragging");
  });
  img.addEventListener("pointermove", e=>{
    if(!dragging) return;
    const rect = img.getBoundingClientRect();
    const dxPercent = ((e.clientX-startX)/rect.width)*100;
    const dyPercent = ((e.clientY-startY)/rect.height)*100;
    editPos.x = Math.max(0, Math.min(100, startPos.x - dxPercent));
    editPos.y = Math.max(0, Math.min(100, startPos.y - dyPercent));
    applyPreviewPosition();
  });
  const stop = ()=>{ dragging=false; img.classList.remove("dragging"); };
  img.addEventListener("pointerup", stop);
  img.addEventListener("pointercancel", stop);
})();
document.getElementById("resetPosBtn").addEventListener("click", ()=>{ editPos={x:50,y:50}; applyPreviewPosition(); });

function openEditor(id, presetCat){
  editingId = id || null;
  const it = id ? items.find(x=>x.id===id) : null;
  document.getElementById("modalTitle").textContent = it ? "編輯捷徑" : "新增捷徑";
  document.getElementById("fTitle").value = it ? it.title : "";
  document.getElementById("fCategory").value = it ? (it.category||"other") : (presetCat || (activeCategory!=="all"?activeCategory:CATEGORIES[0].id));
  document.getElementById("fUrl").value = it ? it.url : "";
  document.getElementById("fExternal").checked = it ? it.openMode==="external" : false;
  document.getElementById("fNote").value = it ? (it.note||"") : "";
  editSubjects = new Set(it && it.subjects ? it.subjects : []);
  markSubjectChips();
  editImage = it ? it.image : null;
  editPos = it && it.pos ? {...it.pos} : {x:50, y:50};
  document.getElementById("coverPreview").src = editImage || autoCover(it?it.title:"", document.getElementById("fCategory").value);
  applyPreviewPosition();
  document.getElementById("fCoverFile").value = "";
  document.getElementById("deleteBtn").style.display = it ? "inline-block" : "none";
  document.getElementById("editorOverlay").classList.add("show");
}
function closeEditor(){ document.getElementById("editorOverlay").classList.remove("show"); }

document.getElementById("fTitle").addEventListener("input", e=>{
  if(!editImage) document.getElementById("coverPreview").src = autoCover(e.target.value, document.getElementById("fCategory").value);
});
document.getElementById("fCategory").addEventListener("change", e=>{
  if(!editImage) document.getElementById("coverPreview").src = autoCover(document.getElementById("fTitle").value, e.target.value);
});
document.getElementById("fUrl").addEventListener("input", e=>{
  if(!editingId && isVideoUrl(e.target.value)) document.getElementById("fCategory").value = "video";
});
document.getElementById("fCoverFile").addEventListener("change", async e=>{
  const file = e.target.files[0];
  if(!file) return;
  showToast("圖片壓縮中...");
  editImage = await compressImage(file);
  editPos = {x:50, y:50};
  document.getElementById("coverPreview").src = editImage;
  applyPreviewPosition();
  showToast("封面已更新，可拖曳調整位置");
});

document.getElementById("addBtn").addEventListener("click", ()=> openEditor(null));
document.getElementById("cancelBtn").addEventListener("click", closeEditor);

document.getElementById("saveBtn").addEventListener("click", async ()=>{
  const title = document.getElementById("fTitle").value.trim();
  if(!title){ alert("請輸入名稱"); return; }
  let url = document.getElementById("fUrl").value.trim();
  if(url && !/^https?:\/\//i.test(url)) url = "https://" + url;
  const category = document.getElementById("fCategory").value;
  const openMode = document.getElementById("fExternal").checked ? "external" : "embed";
  const note = document.getElementById("fNote").value.trim();
  const subjects = [...editSubjects];

  if(editingId){
    const it = items.find(x=>x.id===editingId);
    it.title=title; it.url=url; it.image=editImage; it.pos=editPos;
    it.category=category; it.openMode=openMode; it.note=note; it.subjects=subjects;
  }else{
    const maxOrder = items.reduce((m,x)=> Math.max(m, x.order??0), 0);
    items.push({
      id:"i"+Date.now()+Math.random().toString(16).slice(2),
      title, url, image:editImage, pos:editPos, category, openMode, note, subjects,
      order:maxOrder+1, createdAt:Date.now()
    });
  }
  try{ await saveItems(); }
  catch(err){ alert("儲存失敗，請先匯出備份、刪除幾張照片再試一次。"); return; }
  renderCatStrip(); renderList(); closeEditor();
  showToast("已儲存");
});
document.getElementById("deleteBtn").addEventListener("click", async ()=>{
  if(!editingId) return;
  if(confirm("確定刪除這個捷徑嗎？")){
    items = items.filter(x=>x.id!==editingId);
    await saveItems(); renderCatStrip(); renderList(); closeEditor();
    showToast("已刪除");
  }
});

/* =================== 分類管理 =================== */
let pickedCatEmoji = CAT_ICON_CHOICES[0];
let pickedCatColor = CAT_COLOR_CHOICES[0];

function renderCatManage(){
  const wrap = document.getElementById("catListWrap");
  wrap.innerHTML = CATEGORIES.map(c=>`
    <div class="catlist-row">
      <div class="swatch" style="background:${c.color};">${c.icon}</div>
      <div class="lbl">${escapeHtml(c.label)}</div>
      <button class="rm" data-id="${c.id}">刪除</button>
    </div>`).join("");
  wrap.querySelectorAll(".rm").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      if(CATEGORIES.length <= 1){ alert("至少要保留一個分類喔"); return; }
      const id = btn.dataset.id;
      if(!confirm("刪除這個分類後，裡面的項目會歸到其他分類，確定嗎？")) return;
      CATEGORIES = CATEGORIES.filter(c=>c.id!==id);
      const fallback = CATEGORIES.find(c=>c.id==="other") ? "other" : CATEGORIES[0].id;
      items.forEach(it=>{ if(it.category===id) it.category = fallback; });
      await saveCategories(); await saveItems();
      if(activeCategory===id) activeCategory="all";
      renderCatManage(); renderCatStrip(); fillCategorySelect(); renderList();
      showToast("已刪除分類");
    });
  });
}
function renderCatPickers(){
  document.getElementById("newCatEmojiRow").innerHTML = CAT_ICON_CHOICES.map(e=>`<div class="chip-choice" data-e="${e}">${e}</div>`).join("");
  document.getElementById("newCatColorRow").innerHTML = CAT_COLOR_CHOICES.map(c=>`<div class="chip-choice" data-c="${c}" style="background:${c};width:30px;height:30px;padding:0;border-radius:50%;"></div>`).join("");
  document.querySelectorAll("#newCatEmojiRow .chip-choice").forEach(el=>{
    el.addEventListener("click", ()=>{ pickedCatEmoji = el.dataset.e; document.querySelectorAll("#newCatEmojiRow .chip-choice").forEach(x=>x.classList.remove("selected")); el.classList.add("selected"); });
  });
  document.querySelectorAll("#newCatColorRow .chip-choice").forEach(el=>{
    el.addEventListener("click", ()=>{ pickedCatColor = el.dataset.c; document.querySelectorAll("#newCatColorRow .chip-choice").forEach(x=>x.style.outline=""); el.style.outline = "3px solid " + el.dataset.c; });
  });
}
document.getElementById("manageCatBtn").addEventListener("click", ()=>{
  renderCatManage(); renderCatPickers();
  document.getElementById("catManageOverlay").classList.add("show");
});
document.getElementById("closeCatBtn").addEventListener("click", ()=> document.getElementById("catManageOverlay").classList.remove("show"));
document.getElementById("addCatBtn").addEventListener("click", async ()=>{
  const label = document.getElementById("newCatLabel").value.trim();
  if(!label){ alert("請輸入分類名稱"); return; }
  const id = "c"+Date.now().toString(16);
  CATEGORIES.push({ id, label, icon:pickedCatEmoji, color:pickedCatColor });
  await saveCategories();
  document.getElementById("newCatLabel").value = "";
  renderCatManage(); renderCatStrip(); fillCategorySelect();
  showToast("已新增分類");
});

/* =================== 匯出／匯入（包含分類資料） =================== */
document.getElementById("exportBtn").addEventListener("click", ()=>{
  const payload = { version:2, items, categories:CATEGORIES };
  const blob = new Blob([JSON.stringify(payload)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  const d = new Date();
  const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  a.href = url; a.download = `我的捷徑備份_${stamp}.json`; a.click();
  URL.revokeObjectURL(url);
  showToast("已匯出備份檔");
});
document.getElementById("importBtn").addEventListener("click", ()=> document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async evt=>{
    let imported;
    try{ imported = JSON.parse(evt.target.result); }
    catch(err){ alert("檔案格式錯誤，無法匯入。"); return; }

    let importedItems, importedCats = null;
    if(Array.isArray(imported)){ importedItems = imported; }
    else if(imported && Array.isArray(imported.items)){ importedItems = imported.items; importedCats = imported.categories || null; }
    else{ alert("檔案內容不是有效的備份格式。"); return; }

    const mode = confirm("按「確定」＝合併到現有捷徑\n按「取消」＝清空後改用匯入的內容");
    if(mode){
      const existingIds = new Set(items.map(x=>x.id));
      importedItems.forEach(it=>{ if(!existingIds.has(it.id)) items.push(it); });
      if(importedCats){
        const existingCatIds = new Set(CATEGORIES.map(c=>c.id));
        importedCats.forEach(c=>{ if(!existingCatIds.has(c.id)) CATEGORIES.push(c); });
      }
    }else{
      items = importedItems;
      if(importedCats) CATEGORIES = importedCats;
    }
    await saveItems(); await saveCategories();
    renderCatStrip(); fillCategorySelect(); renderList();
    showToast("匯入完成");
  };
  reader.readAsText(file);
  e.target.value = "";
});

/* =================== Toast =================== */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove("show"), 1700);
}

/* =================== 啟動 =================== */
(async function init(){
  const loadedCats = await loadCategories();
  CATEGORIES = loadedCats !== null ? loadedCats : DEFAULT_CATEGORIES.slice();
  if(loadedCats === null) await saveCategories();

  fillCategorySelect();
  renderSubjectChips();
  renderCatStrip();

  const loaded = await loadItems();
  items = loaded !== null ? loaded : seedItems();
  if(loaded === null) await saveItems();

  renderList();
  updateStorageNote();
})();
</script>
